name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ╔════════════════════════════════════════╦════════════════════════════════════════╗
  # ║            FRONTEND (Next.js)          ║           BACKEND (FastAPI)            ║
  # ║                                        ║                                        ║
  # ║    Checkout → Setup → Install          ║    Checkout → Setup → Install          ║
  # ║       ↓                                 ║       ↓                                 ║
  # ║    Test (Vitest) → Build (Next.js)     ║    Lint (Ruff) → Test (Pytest) → DB   ║
  # ╚════════════════════════════════════════╩════════════════════════════════════════╝

  # ────────────────────────────────────────────────────────────────────────────────
  # LEFT SIDE: FRONTEND — Next.js + React + TypeScript
  # ────────────────────────────────────────────────────────────────────────────────

  frontend:
    name: "Frontend │ install → test → build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: "📦 Checkout code"
        uses: actions/checkout@v4

      - name: "🔧 Setup pnpm"
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: "⚙️  Setup Node.js 24"
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: "📥 Install dependencies"
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: "🧪 Unit tests (Vitest)"
        run: pnpm vitest run

      - name: "🏗️  Build production"
        run: pnpm build
        env:
          BCCH_USER: ""
          BCCH_PASS: ""

  # ────────────────────────────────────────────────────────────────────────────────
  # RIGHT SIDE: BACKEND — FastAPI + Python 3.11
  # ────────────────────────────────────────────────────────────────────────────────

  backend:
    name: "Backend │ install → lint → test → validate"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: "📦 Checkout code"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: "📥 Install dependencies"
        run: pip install -r requirements.txt

      - name: "🔍 Lint code (Ruff)"
        run: |
          ruff check --fix --select=E,W,F,I --ignore=E501 app/ main.py tests/
          ruff check --select=E,W,F,I --ignore=E501 app/ main.py tests/

      - name: "🧪 Unit tests (Pytest)"
        run: pytest tests/ -v --tb=short

      - name: "🗄️  Validate migrations (dry-run)"
        env:
          DATABASE_URL: "sqlite:///test.db"
        run: alembic upgrade head
