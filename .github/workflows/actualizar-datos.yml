name: Actualizar Datos AFP

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: data-sync
  cancel-in-progress: false

jobs:
  sync-indicadores:
    name: Sync indicadores desde Banco Central
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh indicadores (UTM, IPC, Salario Mínimo)
        env:
          BCCH_USER: ${{ secrets.BCCH_USER }}
          BCCH_PASS: ${{ secrets.BCCH_PASS }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/refresh_indicadores.py

      - name: Update comisiones cache
        run: python scripts/update_comisiones.py

      - name: Validate database state
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -c "from app.database import getEngine; print('✓ Database OK')"
