name: Actualizar Datos AFP

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: data-sync
  cancel-in-progress: false

jobs:
  sync-comisiones:
    name: Sync comisiones desde API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch comisiones from quetalmiafp API
        env:
          QUETALMIAFP_API_KEY: ${{ secrets.QUETALMIAFP_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/actualizar_cuotas.py

      - name: Notify on failure
        if: failure()
        run: echo "Failed to sync comisiones — check API availability"
